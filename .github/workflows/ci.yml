name: Qualitätssicherung

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  python-tests:
    name: Python-Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Unit-Tests ausführen
        run: python -m unittest discover -s tests -p 'test_python_*.py'
